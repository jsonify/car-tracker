<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body { font-family: Arial, sans-serif; font-size: 14px; color: #222; }
  .container { max-width: 600px; margin: 40px auto; }
  .header { font-size: 18px; font-weight: bold; margin-bottom: 16px; }
  .message { font-size: 14px; color: #555; line-height: 1.6; }
  .note { margin-top: 20px; padding: 10px 14px; background: #f8f9fa; border-left: 4px solid #aaa; font-size: 13px; color: #666; }
</style>
</head>
<body>
<div class="container">
  <div class="header">Costco Travel — Monitoring Paused</div>
  <div class="message">
    <p>There are no active bookings in your configuration. Price monitoring has been paused.</p>
    <p>No further emails will be sent until a new booking is added.</p>
  </div>
  <div class="note">
    To resume monitoring, add a new booking via iMessage or by editing <code>config.yaml</code> directly.
  </div>
</div>
</body>
</html>
