name: Spike — Chrome scrape test (manual only)

on:
  workflow_dispatch:
  push:
    branches:
      - spike/github-actions-chrome-test

jobs:
  scrape-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - uses: astral-sh/setup-uv@v3

      - run: uv sync

      - name: Run spike scrape
        run: uv run python scripts/spike_chrome_test.py
        env:
          CAR_TRACKER_CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          COSTCO_USERNAME: ${{ secrets.COSTCO_USERNAME }}
          COSTCO_PASSWORD: ${{ secrets.COSTCO_PASSWORD }}
